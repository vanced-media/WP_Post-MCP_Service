<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCP Server Test</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
        }

        button {
            padding: 10px;
            margin: 5px;
            cursor: pointer;
        }

        pre {
            background: #f4f4f4;
            padding: 10px;
            overflow-x: auto;
            max-height: 400px;
        }
    </style>
</head>

<body>
    <h1>WP MCP Service Tester</h1>
    <div>
        <button onclick="connect()">1. Connect SSE</button>
        <button onclick="testTool()">2. Call Get_PostList</button>
        <button onclick="testEditPost()">3. Call Edit_SinglePost (ID 3722)</button>
    </div>

    <h3>Log Output:</h3>
    <pre id="log">Waiting...</pre>

    <script>
        let messageEndpoint = 'http://localhost:3000/messages';

        function log(msg) {
            const el = document.getElementById('log');
            if (el.textContent === 'Waiting...') el.textContent = '';
            el.textContent += msg + '\n\n';
        }

        function connect() {
            log('Connecting to SSE...');
            const sse = new EventSource('http://localhost:3000/sse');

            // Lắng nghe các JSON-RPC response từ Server
            sse.onmessage = (e) => {
                log('🟢 SERVER RESPONSE:\n' + JSON.stringify(JSON.parse(e.data), null, 2));
            };

            // Server SSE của MCP sẽ gửi event 'endpoint' chứa URL để gửi tin nhắn (thường là URL tương đối)
            sse.addEventListener('endpoint', (e) => {
                log('🔵 Endpoint received: ' + e.data);
                if (e.data.startsWith('http')) {
                    messageEndpoint = e.data;
                } else {
                    messageEndpoint = 'http://localhost:3000' + e.data;
                }
            });

            sse.onopen = () => log('✅ SSE Connected!');
            sse.onerror = (err) => log('❌ SSE Error. Is the server running?');
        }

        async function testTool() {
            const request = {
                jsonrpc: "2.0",
                id: Date.now(),
                method: "tools/call",
                params: {
                    name: "Get_PostList",
                    arguments: { page: 1, per_page: 3 }
                }
            };

            log('📤 SENDING REQUEST:\n' + JSON.stringify(request, null, 2));

            try {
                const res = await fetch(messageEndpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(request)
                });

                if (!res.ok) {
                    log('❌ HTTP Error: ' + res.status);
                }
            } catch (e) {
                log('❌ Fetch Error: ' + e.message);
            }
        }

        async function testEditPost() {
            const request = {
                jsonrpc: "2.0",
                id: Date.now(),
                method: "tools/call",
                params: {
                    name: "Edit_SinglePost",
                    arguments: { 
                        id: 3722,
                        title: "Test Edit Title via MCP",
                        content: "This is a test content from MCP Server Edit Tool."
                    }
                }
            };

            log('📤 SENDING REQUEST:\n' + JSON.stringify(request, null, 2));

            try {
                const res = await fetch(messageEndpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(request)
                });

                if (!res.ok) {
                    log('❌ HTTP Error: ' + res.status);
                }
            } catch (e) {
                log('❌ Fetch Error: ' + e.message);
            }
        }
    </script>
</body>

</html>
